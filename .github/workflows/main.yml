name: Rapport IA Matinal
on:
  schedule:
    - cron: '0 7 * * *' # Se lance tous les jours à 7h00 UTC (8h00 ou 9h00 en France)
  workflow_dispatch: # Permet de le lancer à la main pour tester

jobs:
  run_agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install feedparser google-generativeai
      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent_ia.py
